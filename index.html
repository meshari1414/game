<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة تركيب الصور</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 28px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    /* ── Setup Panel ── */
    #setup {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .upload-zone {
      border: 2px dashed #475569;
      border-radius: 12px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #38bdf8;
      background: #0f2744;
    }
    .upload-zone svg { margin-bottom: 10px; }
    .upload-zone p { color: #94a3b8; font-size: 0.9rem; }
    .upload-zone strong { color: #e2e8f0; }
    #fileInput { display: none; }

    .preview-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      display: none;
    }

    label { font-size: 0.9rem; color: #94a3b8; display: block; margin-bottom: 8px; }

    .grid-options {
      display: flex;
      gap: 10px;
    }
    .grid-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .grid-btn.active {
      border-color: #38bdf8;
      color: #38bdf8;
      background: #0f2744;
    }

    #startBtn {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0f172a;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #startBtn:not(:disabled):hover { opacity: 0.9; }

    /* ── Game Area ── */
    #game { display: none; width: 100%; max-width: 900px; }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .stats {
      display: flex;
      gap: 20px;
    }
    .stat {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 8px 18px;
      text-align: center;
    }
    .stat span { display: block; }
    .stat .val { font-size: 1.4rem; font-weight: 700; color: #38bdf8; }
    .stat .lbl { font-size: 0.75rem; color: #64748b; }

    .action-btns { display: flex; gap: 10px; }
    .btn-outline {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: transparent;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: #94a3b8; color: #e2e8f0; }

    .game-body {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .reference-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      flex: 0 0 160px;
    }
    .reference-box p {
      font-size: 0.8rem;
      color: #64748b;
      text-align: center;
      margin-bottom: 8px;
    }
    .reference-box img {
      width: 100%;
      border-radius: 6px;
    }

    .puzzle-wrapper {
      flex: 1;
      min-width: 280px;
    }

    #puzzleGrid {
      display: grid;
      gap: 3px;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 3px;
      width: fit-content;
      margin: 0 auto;
      user-select: none;
      direction: ltr;
    }

    .piece {
      cursor: grab;
      border-radius: 4px;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .piece:active { cursor: grabbing; }
    .piece.dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }
    .piece.drag-over-target {
      box-shadow: 0 0 0 3px #38bdf8;
      transform: scale(1.05);
    }
    .piece.correct {
      box-shadow: 0 0 0 2px #22c55e;
    }
    .piece canvas { display: block; }

    /* hint animations */
    .piece.hint-wrong {
      box-shadow: 0 0 0 3px #f59e0b, 0 0 12px #f59e0b88;
      animation: hint-pulse-wrong 0.5s ease-in-out 3;
    }
    .piece.hint-correct-slot {
      box-shadow: 0 0 0 3px #22c55e, 0 0 16px #22c55e99;
      animation: hint-pulse-correct 0.5s ease-in-out 3;
    }
    @keyframes hint-pulse-wrong {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }
    @keyframes hint-pulse-correct {
      0%,100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.06); opacity: 0.7; }
    }

    /* confetti canvas */
    #confettiCanvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    /* ── Win Overlay ── */
    #winOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #winOverlay.show { display: flex; }

    .win-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 40px 48px;
      text-align: center;
      max-width: 360px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .win-icon { font-size: 4rem; margin-bottom: 12px; }
    .win-card h2 { font-size: 1.8rem; margin-bottom: 6px; color: #f8fafc; }
    .win-card p  { color: #94a3b8; margin-bottom: 24px; }
    .win-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
    .win-stat .val { font-size: 1.6rem; font-weight: 700; color: #38bdf8; }
    .win-stat .lbl { font-size: 0.8rem; color: #64748b; }
    #playAgainBtn {
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0f172a;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🧩 تركيب الصور</h1>
<!-- Setup -->

<div id="setup">
  <div class="upload-zone" id="uploadZone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p><strong>اضغط لرفع صورة</strong><br/>أو اسحبها هنا</p>
    <input type="file" id="fileInput" accept="image/*" />
  </div>
  <img id="imgPreview" class="preview-img" alt="معاينة" />

  <div>
    <label>حجم اللغز</label>
    <div class="grid-options">
      <button class="grid-btn" data-n="3">3 × 3</button>
      <button class="grid-btn active" data-n="4">4 × 4</button>
      <button class="grid-btn" data-n="5">5 × 5</button>
    </div>
  </div>

  <button id="startBtn" disabled>ابدأ اللعبة</button>
</div>

<!-- Game -->
<div id="game">
  <div class="game-header">
    <div class="stats">
      <div class="stat"><span class="val" id="movesVal">0</span><span class="lbl">حركة</span></div>
      <div class="stat"><span class="val" id="timeVal">00:00</span><span class="lbl">الوقت</span></div>
      <div class="stat"><span class="val" id="progressVal">0%</span><span class="lbl">مكتمل</span></div>
    </div>
    <div class="action-btns">
      <button class="btn-outline" id="hintBtn">💡 مساعدة</button>
      <button class="btn-outline" id="shuffleBtn">🔀 خلط</button>
      <button class="btn-outline" id="backBtn">← صورة جديدة</button>
    </div>
  </div>

  <div class="game-body">
    <div class="reference-box">
      <p>الصورة الأصلية</p>
      <img id="refImage" alt="مرجع" />
    </div>
    <div class="puzzle-wrapper">
      <div id="puzzleGrid"></div>
    </div>
  </div>
</div>

<!-- Confetti -->
<canvas id="confettiCanvas"></canvas>

<!-- Win -->
<div id="winOverlay">
  <div class="win-card">
    <div class="win-icon">🎉</div>
    <h2>أحسنت!</h2>
    <p>لقد أكملت اللغز بنجاح</p>
    <div class="win-stats">
      <div class="win-stat"><div class="val" id="winMoves">0</div><div class="lbl">حركة</div></div>
      <div class="win-stat"><div class="val" id="winTime">0:00</div><div class="lbl">الوقت</div></div>
    </div>
    <button id="playAgainBtn">العب مجدداً</button>
  </div>
</div>

<script>
(() => {
  // ── State ──────────────────────────────────────────────────────────────
  let imgSrc = null;
  let gridN = 4;
  let pieces = [];   // array of { correctIndex, currentIndex }
  let order = [];    // order[slot] = pieceIndex (which piece sits in slot i)
  let moves = 0;
  let seconds = 0;
  let timerInterval = null;
  let pieceSize = 0;
  let dragSrc = null;

  // ── Elements ──────────────────────────────────────────────────────────
  const setupEl    = document.getElementById('setup');
  const gameEl     = document.getElementById('game');
  const winOverlay = document.getElementById('winOverlay');
  const fileInput  = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const imgPreview = document.getElementById('imgPreview');
  const startBtn   = document.getElementById('startBtn');
  const puzzleGrid = document.getElementById('puzzleGrid');
  const refImage   = document.getElementById('refImage');
  const movesVal   = document.getElementById('movesVal');
  const timeVal    = document.getElementById('timeVal');
  const progressVal= document.getElementById('progressVal');
  const hintBtn    = document.getElementById('hintBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const backBtn    = document.getElementById('backBtn');
  const playAgainBtn = document.getElementById('playAgainBtn');
  const winMoves   = document.getElementById('winMoves');
  const winTime    = document.getElementById('winTime');

  // ── Upload ────────────────────────────────────────────────────────────
  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    loadFile(e.dataTransfer.files[0]);
  });

  function loadFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => {
      imgSrc = ev.target.result;
      imgPreview.src = imgSrc;
      imgPreview.style.display = 'block';
      startBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  // ── Grid selection ────────────────────────────────────────────────────
  document.querySelectorAll('.grid-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gridN = parseInt(btn.dataset.n);
    });
  });

  // ── Start ─────────────────────────────────────────────────────────────
  startBtn.addEventListener('click', startGame);

  function startGame() {
    setupEl.style.display = 'none';
    gameEl.style.display = 'block';
    refImage.src = imgSrc;
    moves = 0; seconds = 0;
    updateStats();
    buildPuzzle();
    startTimer();
  }

  function buildPuzzle() {
    const total = gridN * gridN;

    // Responsive piece size
    const maxW = Math.min(window.innerWidth - 220, 560);
    pieceSize = Math.floor((maxW - (gridN + 1) * 3) / gridN);
    pieceSize = Math.max(pieceSize, 60);

    puzzleGrid.style.gridTemplateColumns = `repeat(${gridN}, ${pieceSize}px)`;

    // Create shuffled order
    order = Array.from({length: total}, (_, i) => i);
    shuffle(order);

    renderGrid();
  }

  function renderGrid() {
    puzzleGrid.innerHTML = '';
    const total = gridN * gridN;

    order.forEach((pieceIdx, slot) => {
      const el = document.createElement('div');
      el.className = 'piece' + (pieceIdx === slot ? ' correct' : '');
      el.style.width  = pieceSize + 'px';
      el.style.height = pieceSize + 'px';
      el.dataset.slot = slot;

      const canvas = document.createElement('canvas');
      canvas.width  = pieceSize;
      canvas.height = pieceSize;
      drawPiece(canvas, pieceIdx);
      el.appendChild(canvas);

      // Drag events
      el.draggable = true;
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragover',  onDragOver);
      el.addEventListener('dragleave', onDragLeave);
      el.addEventListener('drop',      onDrop);
      el.addEventListener('dragend',   onDragEnd);

      // Touch events
      el.addEventListener('touchstart', onTouchStart, {passive: true});
      el.addEventListener('touchmove',  onTouchMove,  {passive: false});
      el.addEventListener('touchend',   onTouchEnd);

      puzzleGrid.appendChild(el);
    });
  }

  function drawPiece(canvas, pieceIdx) {
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      const col = pieceIdx % gridN;
      const row = Math.floor(pieceIdx / gridN);
      const srcW = img.width  / gridN;
      const srcH = img.height / gridN;
      ctx.drawImage(img,
        col * srcW, row * srcH, srcW, srcH,
        0, 0, pieceSize, pieceSize
      );
    };
    img.src = imgSrc;
  }

  // ── Drag & Drop ───────────────────────────────────────────────────────
  function onDragStart(e) {
    dragSrc = this;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (this !== dragSrc) this.classList.add('drag-over-target');
  }

  function onDragLeave() {
    this.classList.remove('drag-over-target');
  }

  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over-target');
    if (this === dragSrc) return;
    swapSlots(parseInt(dragSrc.dataset.slot), parseInt(this.dataset.slot));
  }

  function onDragEnd() {
    this.classList.remove('dragging');
  }

  // ── Touch drag ────────────────────────────────────────────────────────
  let touchSrcSlot = null;
  let ghostEl = null;

  function onTouchStart(e) {
    touchSrcSlot = parseInt(this.dataset.slot);
    const touch = e.touches[0];
    // create ghost
    ghostEl = this.cloneNode(true);
    ghostEl.style.cssText = `
      position: fixed; opacity: 0.75; pointer-events: none; z-index: 999;
      width: ${pieceSize}px; height: ${pieceSize}px; border-radius: 4px;
      transform: scale(1.1);
      left: ${touch.clientX - pieceSize/2}px;
      top:  ${touch.clientY - pieceSize/2}px;
    `;
    document.body.appendChild(ghostEl);
    this.classList.add('dragging');
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (ghostEl) {
      ghostEl.style.left = (touch.clientX - pieceSize/2) + 'px';
      ghostEl.style.top  = (touch.clientY - pieceSize/2) + 'px';
    }
    // highlight target
    document.querySelectorAll('.piece.drag-over-target')
      .forEach(p => p.classList.remove('drag-over-target'));
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el && el.closest('.piece');
    if (target && parseInt(target.dataset.slot) !== touchSrcSlot) {
      target.classList.add('drag-over-target');
    }
  }

  function onTouchEnd(e) {
    if (ghostEl) { ghostEl.remove(); ghostEl = null; }
    document.querySelectorAll('.piece').forEach(p => {
      p.classList.remove('dragging', 'drag-over-target');
    });
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el && el.closest('.piece');
    if (target && touchSrcSlot !== null) {
      const destSlot = parseInt(target.dataset.slot);
      if (destSlot !== touchSrcSlot) swapSlots(touchSrcSlot, destSlot);
    }
    touchSrcSlot = null;
  }

  // ── Core logic ────────────────────────────────────────────────────────
  function swapSlots(a, b) {
    [order[a], order[b]] = [order[b], order[a]];
    moves++;
    updateStats();
    renderGrid();
    checkWin();
  }

  function checkWin() {
    const correct = order.filter((p, i) => p === i).length;
    const total   = gridN * gridN;
    progressVal.textContent = Math.round(correct / total * 100) + '%';

    if (correct === total) {
      clearInterval(timerInterval);
      winMoves.textContent = moves;
      winTime.textContent  = timeVal.textContent;
      launchConfetti();
      setTimeout(() => winOverlay.classList.add('show'), 600);
    }
  }

  // ── Confetti ──────────────────────────────────────────────────────────
  function launchConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    const COLORS = ['#38bdf8','#818cf8','#f472b6','#facc15','#4ade80','#fb923c','#e879f9'];
    const COUNT  = 160;
    const particles = Array.from({length: COUNT}, () => ({
      x:    Math.random() * canvas.width,
      y:    Math.random() * -canvas.height * 0.5 - 20,
      w:    6 + Math.random() * 10,
      h:    4 + Math.random() * 6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx:   (Math.random() - 0.5) * 4,
      vy:   2 + Math.random() * 4,
      angle: Math.random() * Math.PI * 2,
      spin:  (Math.random() - 0.5) * 0.2,
      gravity: 0.12,
    }));

    let startTime = null;
    const DURATION = 4000; // ms

    function frame(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.vy    += p.gravity;
        p.x     += p.vx;
        p.y     += p.vy;
        p.angle += p.spin;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = elapsed < DURATION - 800
          ? 1
          : Math.max(0, 1 - (elapsed - (DURATION - 800)) / 800);
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();

        // wrap back to top
        if (p.y > canvas.height + 20) {
          p.y  = -20;
          p.x  = Math.random() * canvas.width;
          p.vy = 2 + Math.random() * 4;
        }
      });

      if (elapsed < DURATION) {
        requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    requestAnimationFrame(frame);
  }

  function updateStats() {
    movesVal.textContent = moves;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    timeVal.textContent = m + ':' + s;
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => { seconds++; updateStats(); }, 1000);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // ── Hint: highlight wrong piece + its correct slot ───────────────────
  hintBtn.addEventListener('click', () => {
    const allPieces = [...document.querySelectorAll('.piece')];

    // Find first misplaced piece
    const wrongEl = allPieces.find(p => {
      const slot = parseInt(p.dataset.slot);
      return order[slot] !== slot;
    });
    if (!wrongEl) return;

    const wrongSlot  = parseInt(wrongEl.dataset.slot);
    const pieceIdx   = order[wrongSlot];   // this piece's correct position = pieceIdx
    const correctEl  = allPieces.find(p => parseInt(p.dataset.slot) === pieceIdx);

    // Remove any existing hint classes first
    allPieces.forEach(p => p.classList.remove('hint-wrong', 'hint-correct-slot'));

    // Apply
    wrongEl.classList.add('hint-wrong');
    if (correctEl) correctEl.classList.add('hint-correct-slot');

    // Clean up after animation (3 pulses × 0.5s = 1.5s)
    setTimeout(() => {
      wrongEl.classList.remove('hint-wrong');
      if (correctEl) correctEl.classList.remove('hint-correct-slot');
    }, 1600);
  });

  // ── Shuffle ───────────────────────────────────────────────────────────
  shuffleBtn.addEventListener('click', () => {
    shuffle(order);
    moves = 0; seconds = 0;
    updateStats();
    startTimer();
    renderGrid();
  });

  // ── Back ──────────────────────────────────────────────────────────────
  backBtn.addEventListener('click', () => {
    clearInterval(timerInterval);
    gameEl.style.display  = 'none';
    setupEl.style.display = 'flex';
  });

  // ── Play again ────────────────────────────────────────────────────────
  playAgainBtn.addEventListener('click', () => {
    winOverlay.classList.remove('show');
    moves = 0; seconds = 0;
    updateStats();
    buildPuzzle();
    startTimer();
  });

})();
</script>
</body>
</html>
